<section>
    <ngx-card [config]="{width:'100%',padding:'10px'}">
        <div class="d-flex align-items-center justify-content-between">
            <span>Recent invoices</span>
            <ngx-card [config]="{padding:'6px'}">
                <div class="d-flex align-items-center justify-content-center gap-2 cursor-pointer">
                    <i class="fi fi-rs-arrow-up-right"></i>
                    View all
                </div>
            </ngx-card>
        </div>

        <div>
            <table mat-table [dataSource]="tableData()">
                <ng-container matColumnDef="#">
                    <th mat-header-cell *matHeaderCellDef>#</th>
                    <td mat-cell *matCellDef="let element"> {{element.invoiceNumber}} </td>
                </ng-container>
                <ng-container matColumnDef="client">
                    <th mat-header-cell *matHeaderCellDef>Client</th>
                    <td mat-cell *matCellDef="let element"> {{element.clientName}} </td>
                </ng-container>
                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef>Amount</th>
                    <td mat-cell *matCellDef="let element"> {{element.amount | currency:'INR'}} </td>
                </ng-container>
                <ng-container matColumnDef="duedate">
                    <th mat-header-cell *matHeaderCellDef>Due date</th>
                    <td mat-cell *matCellDef="let element"> {{element.dueDate | date :'dd/MM/yyyy'}} </td>
                </ng-container>
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef>Status</th>
                    <td mat-cell *matCellDef="let element" > <mat-chip [ngClass]="{'chip-pending':element.status === invoiceStatus.draft,'chip-success':element.status === invoiceStatus.paid,'chip-warn':element.status === invoiceStatus.sent}">{{element.status}} </mat-chip></td>
                </ng-container>
                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let element" >
                        <div class="actions">
                            <i class="fi fi-rr-eye"></i>
                            <i class="fi fi-rr-trash" *ngIf="element.status === invoiceStatus.draft"></i>
                            <i class="fi fi-rr-download" *ngIf="element.status !== invoiceStatus.draft"></i>
                        </div>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </ngx-card>

</section>
